name: Generate rotation report

on:
  workflow_dispatch:
    inputs:
      force_sector_scan:
        description: "Refresh full-market sector scan instead of using cache"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      skip_depth_refresh:
        description: "Skip institutional and margin depth refresh"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python syntax
        run: python -m compileall rotation_radar

      - name: Generate latest report
        shell: bash
        run: |
          set -euo pipefail

          args=(--update-latest-report --output reports/latest.html)

          if [ "${{ inputs.force_sector_scan }}" = "true" ]; then
            args+=(--force-sector-scan)
          fi

          if [ "${{ inputs.skip_depth_refresh }}" = "true" ]; then
            args+=(--skip-depth-refresh)
          fi

          python -m rotation_radar.cli "${args[@]}"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest-rotation-report
          path: reports/latest.html
          if-no-files-found: error

      - name: Upload generated data artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-data
          path: |
            data/*.generated.csv
            data/*.refreshed.csv
          if-no-files-found: ignore

      - name: Set report date
        shell: bash
        run: echo "REPORT_DATE=$(TZ=Asia/Taipei date +'%Y-%m-%d')" >> "$GITHUB_ENV"

      - name: Send email report
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "【被AI研究社】${{ env.REPORT_DATE }} 股票族群輪動雷達"
          to: ${{ secrets.REPORT_EMAIL_TO }}
          from: AI Stock Rotation Radar <${{ secrets.SMTP_USERNAME }}>
          html_body: file://reports/latest.html
          attachments: reports/latest.html